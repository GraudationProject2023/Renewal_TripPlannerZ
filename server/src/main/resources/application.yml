spring:
  application:
    name: tripplannerz-server
  profiles:
    active: local
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        format_sql: true
        default_batch_fetch_size: 100
  flyway:
    enabled: true
    baseline-on-migrate: true

server:
  port: 8080

# 스키마는 Flyway로만 관리한다 (ddl-auto: validate).
# 모든 시크릿/접속정보는 환경변수로 주입 — 코드/레포에 하드코딩 금지.
app:
  cors:
    allowed-origins: ${APP_CORS_ALLOWED_ORIGINS:http://localhost:3000}

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
